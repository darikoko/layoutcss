name: CI

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Rust project (${{ matrix.os }})
    permissions: write-all
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v2

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Install macOS cross-compilation targets
        if: matrix.os == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Build for Linux & Windows
        if: matrix.os != 'macos-latest'
        run: cargo build --release --all-features

      - name: Build for macOS (Intel & ARM)
        if: matrix.os == 'macos-latest'
        run: |
          cargo build --release --target=x86_64-apple-darwin
          cargo build --release --target=aarch64-apple-darwin
          mkdir -p target/release-universal
          lipo -create -output target/release-universal/layoutcss \
            target/x86_64-apple-darwin/release/layoutcss \
            target/aarch64-apple-darwin/release/layoutcss

      - name: Upload binary (Linux/Windows)
        if: matrix.os != 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: layoutcss-binary-${{ matrix.os }}
          path: target/release/layoutcss*

      - name: Upload macOS universal binary
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: layoutcss-binary-macos-universal
          path: target/release-universal/layoutcss

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Debug - List Downloaded Files
        run: ls -R artifacts

      - name: Rename binaries for clarity
        run: |
          mkdir -p release
          mv artifacts/layoutcss-binary-ubuntu-latest/layoutcss release/layoutcss-linux
          mv artifacts/layoutcss-binary-macos-universal/layoutcss release/layoutcss-macos
          mv artifacts/layoutcss-binary-windows-latest/layoutcss.exe release/layoutcss-windows.exe || true

      - name: Make binaries executable (Linux/macOS)
        run: chmod +x release/layoutcss-* || true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}



