on:
  push:
    tags:
      - "v*"

name: CI

jobs:
  build:
    name: Rust project (${{ matrix.os }})
    permissions: write-all
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v2

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Build project
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release --all-features

      # Upload the compiled binary as an artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: layoutcss-binary-${{ matrix.os }}
          path: |
            target/release/layoutcss*
            target/release/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Debug - List Downloaded Files
        run: ls -R artifacts

      - name: Rename binaries for clarity
        run: |
          mkdir -p release
          mv artifacts/layoutcss-binary-ubuntu-latest/layoutcss release/layoutcss-linux
          mv artifacts/layoutcss-binary-macos-latest/layoutcss release/layoutcss-macos
          mv artifacts/layoutcss-binary-windows-latest/layoutcss.exe release/layoutcss-windows.exe || true

      - name: Make binaries executable (Linux/macOS)
        run: chmod +x release/layoutcss-* || true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


